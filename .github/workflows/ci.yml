name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -count=1

      - name: Build
        run: go build -o ecs9s .

      - name: Structure tests
        run: bash tests/run-all.sh

      - name: Hook tests
        run: bash tests/hooks/test-secret-scan.sh
